name: Architecture decision proposal
description: Propose a material architecture or governance decision.
title: "adr: "
labels:
  - architecture
  - decision
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the forces, constraints, and requirements behind the proposed decision.
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Proposed decision
      description: State the decision and alternatives considered.
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: Describe benefits, risks, trade-offs, and review triggers.
    validations:
      required: true

