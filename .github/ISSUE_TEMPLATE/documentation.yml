name: Documentation improvement
description: Propose a correction, clarification, or expansion to the handbook.
title: "docs: "
labels:
  - documentation
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the documentation gap or improvement.
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected files or sections
      description: List the relevant files, chapters, standards, ADRs, or glossary terms.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected outcome
      description: Explain what should be true after the change.
    validations:
      required: true

